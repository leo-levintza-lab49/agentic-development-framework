# Staging Environment Values Example
# Cost-optimized configuration for testing

nameOverride: ""
fullnameOverride: "staging-app"

# Lower replica count for staging
replicaCount: 2

# Staging container image
image:
  repository: myregistry.azurecr.io/staging-app
  pullPolicy: Always  # Always pull latest for testing
  tag: "develop"

imagePullSecrets:
  - name: acr-secret

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/staging-app-role
  name: "staging-app-sa"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/yyy
  hosts:
    - host: app.staging.example.com
      paths:
        - path: /
          pathType: Prefix

# Lower resource limits for cost savings
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

# Conservative autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 85

nodeSelector:
  workload-type: staging

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: APP_ENV
    value: staging
  - name: LOG_LEVEL
    value: debug
  - name: ENABLE_PROFILING
    value: "true"

envFrom:
  - configMapRef:
      name: staging-app-config
  - secretRef:
      name: staging-app-secrets

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp

configMap:
  enabled: true
  data:
    config.yaml: |
      server:
        port: 8080
      features:
        new_ui: true
        beta_features: true
      logging:
        level: debug

podDisruptionBudget:
  enabled: true
  minAvailable: 1

labels:
  environment: staging
  team: platform
