# Local Workspace Configuration
#
# This file defines the local directory structure for cloning
# and managing repositories from both organizations.

# Organization: omnibase-poc (Monorepo)
# All monorepo content will be cloned here
OMNIBASE_LOCAL_DIR="$HOME/wrk/omnybase"
OMNIBASE_ORG="omnibase-poc"

# Organization: polybase-poc (Multi-repo)
# Each repository will be cloned as a subdirectory here
POLYBASE_LOCAL_DIR="$HOME/wrk/polybase"
POLYBASE_ORG="polybase-poc"

# Clone behavior
CLONE_REPOS_LOCALLY="true"
AUTO_PULL_UPDATES="false"
CREATE_SYMLINKS="false"

# Directory structure for polybase-poc:
# ~/wrk/polybase/
#   ├── db-schemas/
#   ├── db-migrations/
#   ├── user-service/
#   ├── auth-service/
#   ├── order-service/
#   ├── payment-service/
#   ├── notification-service/
#   ├── web-bff/
#   ├── mobile-bff/
#   ├── graphql-gateway/
#   ├── web-app/
#   ├── component-library/
#   ├── ios-app/
#   ├── android-app/
#   ├── mobile-shared/
#   ├── terraform-aws-infrastructure/
#   ├── grafana-dashboards/
#   ├── prometheus-alerts/
#   └── claude-configs-shared/

# Directory structure for omnibase-poc:
# ~/wrk/omnybase/
#   └── enterprise-monorepo/
#       └── (monorepo contents)
