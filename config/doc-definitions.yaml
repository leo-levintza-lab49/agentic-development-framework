# Documentation Standards

standards:
  minimum_requirements:
    - README.md with overview and quick start
    - docs/ARCHITECTURE.md for services
    - docs/SETUP.md for development environment

  recommended:
    - docs/API.md for services with APIs
    - docs/DEPLOYMENT.md for deployable services
    - docs/CONTRIBUTING.md for all repos
    - Mermaid diagrams for architecture

  optional:
    - docs/TROUBLESHOOTING.md
    - docs/FAQ.md
    - docs/PERFORMANCE.md

# Diagram Templates

diagram_types:
  architecture_overview:
    type: graph
    description: "High-level component diagram"

  sequence_flow:
    type: sequenceDiagram
    description: "Interaction flow between components"

  erd:
    type: erDiagram
    description: "Entity relationship diagram"

  state_diagram:
    type: stateDiagram-v2
    description: "State machine or lifecycle"

  deployment:
    type: graph
    description: "Deployment architecture"

# Priority Levels

priorities:
  high:
    description: "Core services - generate first"
    sla: "Complete within 1 day"

  medium:
    description: "Supporting services - generate second"
    sla: "Complete within 3 days"

  low:
    description: "Optional/experimental - generate last"
    sla: "Complete within 1 week"
